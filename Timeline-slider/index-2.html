<div class="custom-timeline-wrapper">
  <div class="timeline-slider" id="timelineSlider">
    <div class="timeline-track" id="timelineTrack">
      <!-- Step 1 -->
      <div class="timeline-step">
        <div class="circle"></div>
        <div class="vertical-line"></div>
        <div class="step-label">Launch Start</div>
        <div class="step-date">June, 2018</div>
      </div>
      <!-- Step 2 -->
      <div class="timeline-step">
        <div class="circle"></div>
        <div class="vertical-line"></div>
        <div class="step-label">Beta Testing</div>
        <div class="step-date">Dec, 2018</div>
      </div>
      <!-- Step 3 -->
      <div class="timeline-step">
        <div class="circle"></div>
        <div class="vertical-line"></div>
        <div class="step-label">Integrations</div>
        <div class="step-date">Q2, 2019</div>
      </div>
      <!-- Step 4 -->
      <div class="timeline-step">
        <div class="circle"></div>
        <div class="vertical-line"></div>
        <div class="step-label">Shopping</div>
        <div class="step-date">Q3, 2019</div>
      </div>
      <!-- Step 5 (your duplicate example) -->
      <div class="timeline-step">
        <div class="circle"></div>
        <div class="vertical-line"></div>
        <div class="step-label">Extra Step</div>
        <div class="step-date">Later</div>
      </div>
    </div>
  </div>

  <button type="button" class="nav-arrow left" id="prevBtn" disabled>
    <img src="https://static1.squarespace.com/static/69b307e60a6a5f64491e6dde/t/69c192e3cf462e6dd469a78e/1774293731993/back+%281%29.png" alt="Previous">
  </button>
  <button type="button" class="nav-arrow right" id="nextBtn">
    <img src="https://static1.squarespace.com/static/69b307e60a6a5f64491e6dde/t/69c192e3a9a51e43eb6d4b6f/1774293731991/right-arrow+%282%29.png" alt="Next">
  </button>
</div>

<style>
  .custom-timeline-wrapper {
    position: relative;
    padding: 60px 70px 40px;   /* extra side padding for arrows */
    border-radius: 12px;
    max-width: 1100px;
    margin: 40px auto;
    overflow: hidden;
  }

  .timeline-slider {
    width: 100%;
    overflow: hidden;
  }

  .timeline-track {
    display: flex;
    transition: transform 0.5s ease;
    width: max-content;
  }

  .timeline-step {
    flex: 0 0 220px;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .timeline-step:not(:last-child) {
    margin-right: 60px;
  }

  .circle {
    width: 22px;
    height: 22px;
    background: #052036;
    border: 5px solid #f6c744;
    border-radius: 50%;
    margin: 0 auto 18px;
    position: relative;          /* helps with stacking context */
  z-index: 3;
  }
  .vertical-line {
  width: 3px;        
  height: 28px; 
  background: #0590e4;
  margin: 4px auto 12px;
}

  .step-label {
    color: #ffffff;
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .step-date {
    color: #8b949e;
    font-size: 0.95rem;
  }

  /* Connecting line */
  .timeline-slider::before {
    content: "";
    position: absolute;
    top: 32%;
    left: 70px;
    right: 70px;
    height: 5px;
    background: #143652;
    transform: translateY(-50%);
    z-index: 2;
  }

  /* Navigation arrows */
  .nav-arrow {
    position: absolute;
    top: 32%;
    transform: translateY(-50%);
    width: 60px;
    height: 60px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.25s, transform 0.2s;
    z-index: 10;
    padding: 0;
  }

  .nav-arrow:hover {
    opacity: 0.8;
  }

  .nav-arrow:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }

  .nav-arrow img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* keeps aspect ratio, no distortion */
  }

  .nav-arrow.left  { left:  0; }
  .nav-arrow.right { right: 0; }

  @media (max-width: 767px) {
    .custom-timeline-wrapper {
      padding: 40px 50px 30px;
    }
    .timeline-step {
      flex: 0 0 160px;
      margin-right: 40px !important;
    }
    .nav-arrow {
      width: 50px;
      height: 50px;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const track = document.getElementById('timelineTrack');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const slider = document.getElementById('timelineSlider');

    if (!track || !prevBtn || !nextBtn) return;

    let currentIndex = 0;
    const steps = document.querySelectorAll('.timeline-step');
    if (steps.length === 0) return;

    // Recalculate step width dynamically (safer in Squarespace)
    const getStepWidth = () => steps[0].offsetWidth + parseInt(getComputedStyle(steps[0]).marginRight || '60');
    let stepWidth = getStepWidth();
    let visibleWidth = slider.offsetWidth;
    let maxScroll = (steps.length * stepWidth) - visibleWidth - 40; // buffer

    // Update on resize (Squarespace responsive can change sizes)
    window.addEventListener('resize', () => {
      stepWidth = getStepWidth();
      visibleWidth = slider.offsetWidth;
      maxScroll = (steps.length * stepWidth) - visibleWidth - 40;
      // Clamp current index if needed
      currentIndex = Math.max(0, Math.min(currentIndex, maxScroll));
      track.style.transform = `translateX(-${currentIndex}px)`;
      updateButtons();
    });

    function updateButtons() {
      prevBtn.disabled = currentIndex <= 0;
      nextBtn.disabled = currentIndex >= maxScroll;
    }

    prevBtn.addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex = Math.max(currentIndex - stepWidth, 0);
        track.style.transform = `translateX(-${currentIndex}px)`;
        updateButtons();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentIndex < maxScroll) {
        currentIndex = Math.min(currentIndex + stepWidth, maxScroll);
        track.style.transform = `translateX(-${currentIndex}px)`;
        updateButtons();
      }
    });

    updateButtons();
  });
</script>
