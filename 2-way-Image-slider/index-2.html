<style>
  /* স্লাইডারের মেইন কন্টেইনার */
  .elegant-logo-slider-container {
    width: 100%;
    overflow: hidden;
    position: relative;
    padding: 20px 0;
  }

  /* ট্র্যাক যেখানে লোগোগুলো মুভ করবে */
  .elegant-logo-slider-track {
    display: flex;
    animation: elegantStepSlide 5s linear infinite; /* 6s total — no pause */
    width: max-content;
    background: #0d0710;
  }

  /* প্রতিটি লোগো আইটেম */
  .elegant-logo-item {
flex-shrink: 0;
    width: 80px;
    height: 55px;
    margin-right: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #171932;
    border: 1px solid #36203d;
    border-radius: 16px;
    padding: 5px;
  }

  .elegant-logo-placeholder {
    width: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s ease;
    
  }

  .elegant-logo-placeholder img {
    height: 100%;
    object-fit: contain;
    background: #0c0e27;
    border-radius: 16px;
    padding: 10px;
  }

  /* Continuous step animation — no pause, 5 steps */
  @keyframes elegantStepSlide {
    0%     { transform: translateX(0); }
    20%    { transform: translateX(calc(-260px * 1)); }
    40%    { transform: translateX(calc(-260px * 2)); }
    60%    { transform: translateX(calc(-260px * 3)); }
    80%    { transform: translateX(calc(-260px * 4)); }
    100%   { transform: translateX(calc(-260px * 5)); }
  }

  /* Mobile responsive */
  @media (max-width: 768px) {
    .elegant-logo-item { width: 160px; margin: 0 20px; }
    .elegant-logo-slider-track { width: calc(200px * 10); }
    @keyframes elegantStepSlide {
      0%     { transform: translateX(0); }
      20%    { transform: translateX(calc(-200px * 1)); }
      40%    { transform: translateX(calc(-200px * 2)); }
      60%    { transform: translateX(calc(-200px * 3)); }
      80%    { transform: translateX(calc(-200px * 4)); }
      100%   { transform: translateX(calc(-200px * 5)); }
    }
  }
</style>
